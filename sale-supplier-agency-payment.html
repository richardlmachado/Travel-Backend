<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento Fornecedor ↔ Agência — TravelAgent OS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
  <style>
    body { padding-bottom: 80px; }
    .sale-topbar {
      position: sticky; top: 0; z-index: 200;
      background: #1e3a5f; color: white;
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0 1.25rem; height: 56px; border-bottom: 2px solid #2563eb;
    }
    .sale-topbar-title { font-size: 14px; font-weight: 900; color: white; }
    .sale-topbar-badge { background: rgba(255,255,255,0.2); color: white; border-radius: 0.35rem; padding: 0.2rem 0.625rem; font-size: 11px; font-weight: 800; }

    .summary-box { background: var(--bg-page); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 1.25rem; }
    .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px dashed var(--border-color); gap: 0.5rem; }
    .summary-row:last-child { border-bottom: none; padding-bottom: 0; }
    .summary-row-label { font-size: 12px; color: var(--text-body); font-weight: 500; }
    .summary-row-value { font-size: 13px; font-weight: 800; color: var(--text-heading); white-space: nowrap; }
    .summary-row-value.ok { color: #0d9488; }
    .summary-row-value.big { font-size: 1rem; }

    .product-pay-card { border: 1px solid var(--border-color); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1rem; }
    .product-pay-header { background: #1e3a5f; padding: 0.75rem 1rem; border-bottom: 1px solid var(--border-color); }
    .product-pay-title { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: white; }
    .product-pay-body { padding: 1rem; background: var(--card-bg); }

    .btn-add-payment {
      width: 100%; border: 2px dashed var(--border-color); border-radius: var(--radius);
      padding: 0.625rem; text-align: center; cursor: pointer; color: var(--text-muted);
      font-size: 12px; font-weight: 700; transition: var(--transition); background: none;
      display: flex; align-items: center; justify-content: center; gap: 0.4rem;
    }
    .btn-add-payment:hover { border-color: #2563eb; color: #2563eb; background: #eff6ff; }

    .payment-entry { background: var(--bg-page); border: 1px solid var(--border-color); border-radius: var(--radius); padding: 0.875rem; margin-bottom: 0.75rem; }
    .payment-entry-grid { display: grid; grid-template-columns: auto 1fr 1fr auto 1fr auto; gap: 0.75rem; align-items: end; }
    @media(max-width:900px) { .payment-entry-grid { grid-template-columns: 1fr 1fr; } }

    .sale-footer {
      position: fixed; bottom: 0; left: var(--sidebar-width); right: 0; z-index: 150;
      background: #f1f5f9; border-top: 2px solid var(--border-color);
      display: flex; align-items: center; justify-content: flex-end;
      gap: 0.5rem; padding: 0.75rem 1.5rem; flex-wrap: wrap;
    }
    @media(max-width:991px) { .sale-footer { left: 0; } }
  </style>
</head>
<body>
<div class="os-wrapper">

  <aside class="os-sidebar" id="sidebar">
    <div class="os-sidebar-header">
      <div class="os-brand">
        <div class="os-brand-icon"><i class="bi bi-briefcase-fill"></i></div>
        <div class="os-brand-name">TravelAgent<span>OS</span></div>
      </div>
      <button class="os-sidebar-close" id="sidebar-close"><i class="bi bi-x-lg"></i></button>
    </div>
    <nav class="os-nav">
      <div class="os-nav-section-label">Principal</div>
      <a href="dashboard.html" class="os-nav-item" data-page="dashboard.html"><i class="bi bi-grid-fill"></i> Dashboard</a>
      <a href="reservas.html"  class="os-nav-item active" data-page="reservas.html"><i class="bi bi-folder2-open"></i> Vendas</a>
      <a href="clientes.html"  class="os-nav-item" data-page="clientes.html"><i class="bi bi-people-fill"></i> Clientes & Fornecedores</a>
      <a href="financeiro.html" class="os-nav-item" data-page="financeiro.html"><i class="bi bi-cash-stack"></i> Financeiro</a>
      <div class="os-nav-section-label mt-3">Sistema</div>
      <a href="#" class="os-nav-item"><i class="bi bi-gear-fill"></i> Configurações</a>
    </nav>
    <div class="os-sidebar-footer">
      <div class="os-user-card">
        <div class="os-avatar" data-user-initials>AD</div>
        <div class="os-user-info">
          <div class="os-user-name" data-user-name>Carregando...</div>
          <div class="os-user-role" data-user-role>—</div>
        </div>
        <button class="os-icon-btn ms-auto" data-action="logout" title="Sair"><i class="bi bi-box-arrow-right"></i></button>
      </div>
    </div>
  </aside>
  <div class="os-overlay" id="os-overlay"></div>

  <main class="os-main">
    <div class="sale-topbar">
      <button class="os-icon-btn" id="sidebar-open" style="color:rgba(255,255,255,0.7);border-color:transparent"><i class="bi bi-list"></i></button>
      <i class="bi bi-folder2-open" style="color:rgba(255,255,255,0.7);font-size:18px"></i>
      <span class="sale-topbar-title" id="sale-topbar-title">Venda</span>
      <span class="sale-topbar-badge" id="sale-topbar-badge">—</span>
      <div class="ms-2" style="font-size:13px;font-weight:700;color:rgba(255,255,255,0.85)">
        <i class="bi bi-arrow-left-right me-1"></i>PAGAMENTO FORNECEDOR ↔ AGÊNCIA
      </div>
    </div>

    <div class="os-content">
      <div class="row g-4">

        <div class="col-12 col-md-4">
          <h2 style="font-size:14px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;margin-bottom:1rem">Resumo Fornecedor (BRL)</h2>
          <div class="summary-box">
            <div class="summary-row">
              <span class="summary-row-label">Total ao Fornecedor</span>
              <span class="summary-row-value big ok" id="sum-total-forn">—</span>
            </div>
            <div class="summary-row">
              <span class="summary-row-label">Pagamentos Registrados</span>
              <span class="summary-row-value" id="sum-pagamentos">R$ 0,00</span>
            </div>
            <div class="summary-row">
              <span class="summary-row-label">% Pago</span>
              <span class="summary-row-value" id="sum-pct">0,00%</span>
            </div>
            <div class="summary-row" style="border-top:2px solid var(--border-color);margin-top:.5rem;padding-top:.75rem">
              <span class="summary-row-label" style="font-weight:700">Restante</span>
              <span class="summary-row-value big" style="color:var(--danger)" id="sum-restante">—</span>
            </div>
          </div>
        </div>

        <div class="col-12 col-md-8">
          <h2 style="font-size:14px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;margin-bottom:1rem">Pagamentos ao Fornecedor</h2>
          <div id="products-container">
            <div class="text-muted text-center py-4"><i class="bi bi-hourglass-split me-2"></i>Carregando...</div>
          </div>
        </div>

      </div>
    </div>
  </main>
</div>

<div class="sale-footer">
  <button class="btn-os-ghost" id="btn-back"><i class="bi bi-arrow-left me-1"></i>Voltar Venda</button>
  <button class="btn-os-ghost" id="btn-save"><i class="bi bi-floppy me-1"></i>Salvar</button>
  <button class="btn-os" onclick="goScreen('sale-supplier-customer-payment.html')">
    <i class="bi bi-arrow-left-right me-1"></i>Pgto Cliente ↔ Fornecedor
  </button>
  <button class="btn-os" onclick="goScreen('sale-finalize.html')" style="background:#0d9488">
    <i class="bi bi-arrow-left-right me-1"></i>Pgto Cliente ↔ Agência
  </button>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/notifications.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/theme.js"></script>
<script src="assets/js/app.js"></script>
<script>
const CURRENCIES = [
  {code:'BRL',label:'REAL'},{code:'USD',label:'DÓLAR AMERICANO'},{code:'EUR',label:'EURO'},
  {code:'GBP',label:'LIBRA ESTERLINA'},{code:'CAD',label:'DÓLAR CANADENSE'},{code:'AUD',label:'DÓLAR AUSTRALIANO'},
  {code:'CHF',label:'FRANCO SUÍÇO'},{code:'JPY',label:'IENE JAPONÊS'},{code:'MXN',label:'PESO MEXICANO'},
  {code:'ARS',label:'PESO ARGENTINO'},{code:'CLP',label:'PESO CHILENO'},{code:'TRY',label:'LIRA TURCA'},
  {code:'INR',label:'RUPIA INDIANA'},{code:'ZAR',label:'RAND SUL-AFRICANO'},
];
const PAYMENT_METHODS = [
  'Dinheiro','Pix','Cartão de Crédito','Cartão de Débito','Débito em Conta',
  'Depósito','Cheque','Faturado','Boleto','Transferência','Pré Pagamento','Carta de Crédito'
];
const fmtMoney = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
const fmtPct   = v => new Intl.NumberFormat('pt-BR',{style:'percent',minimumFractionDigits:2}).format(v||0);

const params = new URLSearchParams(location.search);
const saleId = params.get('id');
let itens = [];

function goScreen(page) { window.location.href = `${page}?id=${saleId}`; }

function currencyOptions(sel) {
  return CURRENCIES.map(c => `<option value="${c.code}" ${c.code===sel?'selected':''}>${c.code} — ${c.label}</option>`).join('');
}
function methodOptions(sel) {
  return PAYMENT_METHODS.map(m => `<option ${m===sel?'selected':''}>${m}</option>`).join('');
}

// ── Entry HTML ────────────────────────────────────────────────
function buildEntry(itemId, entryId, data) {
  const today = new Date().toISOString().slice(0,10);
  const valor = data?.valor || '';
  const moeda = data?.moeda || 'BRL';
  const forma = data?.forma_pagamento || 'Pix';
  const nParc = data?.num_parcelas || 1;
  const venc  = data?.parcelas?.[0]?.data_vencimento || '';
  const pago  = data?.status === 'pago';

  return `<div class="payment-entry" id="pe-${itemId}-${entryId}">
    <div class="payment-entry-grid">
      <div>
        <label class="os-label">Moeda</label>
        <select class="input-os pe-moeda" style="width:130px" onchange="recalc()">${currencyOptions(moeda)}</select>
      </div>
      <div>
        <label class="os-label">Valor</label>
        <input type="number" class="input-os pe-valor" step="0.01" min="0" placeholder="0,00" value="${valor}" oninput="recalc()">
      </div>
      <div>
        <label class="os-label">Forma de Pagamento</label>
        <select class="input-os pe-forma">${methodOptions(forma)}</select>
      </div>
      <div>
        <label class="os-label">N. Parcelas</label>
        <input type="number" class="input-os pe-parcelas" value="${nParc}" min="1" max="24" style="width:80px">
      </div>
      <div>
        <label class="os-label">Vencimento 1ª Parcela</label>
        <input type="date" class="input-os pe-venc" value="${venc || today}">
      </div>
      <div>
        <label class="os-label">Status</label>
        <select class="input-os pe-status">
          <option value="pendente" ${!pago?'selected':''}>Pendente</option>
          <option value="pago" ${pago?'selected':''}>Pago</option>
        </select>
      </div>
      <div style="display:flex;align-items:flex-end">
        <button class="os-icon-btn" style="color:var(--danger)" onclick="removeEntry('${itemId}','${entryId}')"><i class="bi bi-trash"></i></button>
      </div>
    </div>
  </div>`;
}

function addEntry(itemId, data) {
  const entryId = `e-${Date.now()}-${Math.random().toString(36).slice(2,5)}`;
  document.getElementById(`pay-list-${itemId}`).insertAdjacentHTML('beforeend', buildEntry(itemId, entryId, data));
  recalc();
}

function removeEntry(itemId, entryId) {
  document.getElementById(`pe-${itemId}-${entryId}`)?.remove();
  recalc();
}

// ── Produtos ──────────────────────────────────────────────────
function renderProducts(existentes) {
  const existMap = {};
  (existentes || []).forEach(pag => {
    const key = pag.venda_item_id;
    if (!existMap[key]) existMap[key] = [];
    existMap[key].push(pag);
  });

  const container = document.getElementById('products-container');
  container.innerHTML = itens.map(item => `
    <div class="product-pay-card">
      <div class="product-pay-header">
        <div class="product-pay-title">${item.fornecedor_nome ? item.fornecedor_nome + ' — ' : ''}${item.descricao || item.tipo_produto}</div>
        <div style="font-size:11px;color:rgba(255,255,255,.7);margin-top:2px">
          Custo: ${fmtMoney(item.total_custo_brl)}
        </div>
      </div>
      <div class="product-pay-body">
        <div id="pay-list-${item.id}"></div>
        <button class="btn-add-payment" onclick="addEntry(${item.id})">
          <i class="bi bi-plus-circle"></i> Adicionar Pagamento
        </button>
      </div>
    </div>
  `).join('');

  itens.forEach(item => {
    const pags = existMap[item.id] || [];
    if (pags.length) pags.forEach(pag => addEntry(item.id, pag));
  });

  recalc();
}

// ── Recalc ────────────────────────────────────────────────────
function recalc() {
  let paid = 0;
  document.querySelectorAll('.pe-valor').forEach(i => { paid += parseFloat(i.value) || 0; });
  const totalForn = itens.reduce((a, it) => a + (+it.total_custo_brl || 0), 0);
  const rest = Math.max(0, totalForn - paid);
  const pct  = totalForn > 0 ? paid / totalForn : 0;
  document.getElementById('sum-pagamentos').textContent = fmtMoney(paid);
  document.getElementById('sum-pct').textContent        = fmtPct(pct);
  document.getElementById('sum-restante').textContent   = fmtMoney(rest);
}

// ── Salvar ────────────────────────────────────────────────────
async function salvar() {
  const pagamentos = [];

  itens.forEach(item => {
    const list = document.getElementById(`pay-list-${item.id}`);
    if (!list) return;
    list.querySelectorAll('.payment-entry').forEach(entryEl => {
      const valor = parseFloat(entryEl.querySelector('.pe-valor')?.value || 0);
      if (valor <= 0) return;
      const moeda  = entryEl.querySelector('.pe-moeda')?.value || 'BRL';
      const forma  = entryEl.querySelector('.pe-forma')?.value || 'Pix';
      const nParc  = parseInt(entryEl.querySelector('.pe-parcelas')?.value || 1);
      const venc   = entryEl.querySelector('.pe-venc')?.value || '';
      const status = entryEl.querySelector('.pe-status')?.value || 'pendente';

      const parcelas = [];
      const parcVal  = +(valor / nParc).toFixed(2);
      const baseDate = venc ? new Date(venc + 'T00:00:00') : new Date();
      for (let i = 0; i < nParc; i++) {
        const d = new Date(baseDate);
        d.setMonth(d.getMonth() + i);
        parcelas.push({
          numero: i + 1,
          valor: parcVal,
          multa_encargo: 0,
          data_vencimento: d.toISOString().slice(0,10),
          pago: status === 'pago' ? 1 : 0,
          data_pagamento: status === 'pago' ? new Date().toISOString().slice(0,10) : null,
        });
      }

      pagamentos.push({
        venda_item_id: item.id,
        moeda, valor, forma_pagamento: forma,
        num_parcelas: nParc,
        parcelas,
      });
    });
  });

  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  try {
    const res  = await Auth.apiFetch(`/api/vendas/${saleId}/pagamentos/sync`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tipo: 'fornecedor_agencia', pagamentos }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
    Notify.success('Pagamentos salvos!');
  } catch (err) {
    Notify.error('Erro ao salvar: ' + err.message);
  } finally { btn.disabled = false; }
}

// ── Carregar ──────────────────────────────────────────────────
async function carregar() {
  if (!saleId) { Notify.error('ID da venda não informado.'); return; }
  try {
    const [rVenda, rPags] = await Promise.all([
      Auth.apiFetch(`/api/vendas/${saleId}`).then(r => r.json()),
      Auth.apiFetch(`/api/vendas/${saleId}/pagamentos?tipo=fornecedor_agencia`).then(r => r.json()),
    ]);

    if (!rVenda.ok) throw new Error(rVenda.error);
    const venda = rVenda.data;
    itens = venda.itens || [];

    document.getElementById('sale-topbar-title').textContent = venda.codigo || `Venda #${venda.id}`;
    document.getElementById('sale-topbar-badge').textContent = venda.codigo || `#${venda.id}`;

    const totalCusto = itens.reduce((a, it) => a + (+it.total_custo_brl || 0), 0);
    document.getElementById('sum-total-forn').textContent  = fmtMoney(totalCusto);
    document.getElementById('sum-restante').textContent    = fmtMoney(totalCusto);

    renderProducts(rPags.ok ? rPags.data : []);

  } catch (err) { Notify.error('Erro ao carregar: ' + err.message); }
}

// ── Eventos ───────────────────────────────────────────────────
document.getElementById('btn-save').addEventListener('click', salvar);
document.getElementById('btn-back').addEventListener('click', () => { window.location.href = `sale-form.html?id=${saleId}`; });
document.getElementById('sidebar-open').addEventListener('click', () => {
  document.getElementById('sidebar')?.classList.add('open');
  document.getElementById('os-overlay')?.classList.add('active');
});
document.getElementById('sidebar-close')?.addEventListener('click', () => {
  document.getElementById('sidebar')?.classList.remove('open');
  document.getElementById('os-overlay')?.classList.remove('active');
});

App.init();
Theme.apply(localStorage.getItem('travelos-theme') || 'light');
carregar();
</script>
</body>
</html>
