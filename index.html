<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TravelAgent OS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
  <style>
    html, body { height: 100%; overflow: hidden; }

    .login-wrapper {
      display: flex;
      height: 100vh;
    }

    /* ── Left panel ── */
    .login-left {
      display: none;
      flex-direction: column;
      justify-content: space-between;
      background: var(--primary);
      color: var(--bg-white);
      padding: 2.5rem 3rem;
      position: relative;
      overflow: hidden;
    }
    @media (min-width: 992px) {
      .login-left { display: flex; flex: 0 0 44%; max-width: 44%; }
    }

    .login-left-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .login-left-logo-icon {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      border: 1.5px solid rgba(255,255,255,.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }
    .login-left-logo span { opacity: .6; font-weight: 400; }

    .login-left-headline {
      font-size: clamp(1.75rem, 3vw, 2.5rem);
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -0.03em;
      max-width: 380px;
    }
    .login-left-sub {
      font-size: 14px;
      font-weight: 400;
      opacity: .55;
      line-height: 1.6;
      max-width: 340px;
      margin-top: 1rem;
    }

    .login-left-footer {
      display: flex;
      gap: 2rem;
      font-size: 12px;
      opacity: .4;
    }

    .login-left-pattern {
      position: absolute;
      right: -80px;
      top: 50%;
      transform: translateY(-50%);
      width: 300px;
      height: 300px;
      border-radius: 50%;
      border: 60px solid rgba(255,255,255,.03);
      pointer-events: none;
    }

    /* ── Right panel ── */
    .login-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: var(--bg-white);
      position: relative;
    }

    .login-form-box {
      width: 100%;
      max-width: 340px;
    }

    /* Mobile logo */
    .login-mobile-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 2.5rem;
    }
    .login-mobile-brand-icon {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-heading);
      font-size: 14px;
    }
    .login-mobile-brand-text {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text-heading);
    }
    .login-mobile-brand-text span { color: var(--accent); font-weight: 600; }
    @media (min-width: 992px) {
      .login-mobile-brand { display: none; }
    }

    .login-welcome {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-heading);
      margin-bottom: 0.25rem;
    }
    .login-welcome-sub {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    .login-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-heading);
      margin-bottom: 0.375rem;
      display: block;
    }

    .login-forgot {
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }
    .login-forgot:hover { text-decoration: underline; }

    .login-error {
      background: var(--danger-light);
      border: 1px solid rgba(220,38,38,.15);
      color: var(--danger);
      border-radius: var(--radius);
      padding: 0.625rem 0.75rem;
      font-size: 13px;
      font-weight: 450;
      display: none;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }
    .login-error.show { display: flex; }

    .login-divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 400;
    }
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-color);
    }

    .btn-social {
      width: 100%;
      padding: 0.575rem;
      background: var(--bg-white);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      cursor: pointer;
      transition: border-color var(--transition);
      font-size: 13px;
      font-weight: 450;
      color: var(--text-body);
    }
    .btn-social:hover { border-color: var(--text-muted); }
    .btn-social img { width: 16px; height: 16px; }

    .login-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      margin-top: 2.5rem;
      font-size: 11px;
      color: var(--text-muted);
    }
    .login-footer i { font-size: 12px; }

    .login-theme-toggle {
      position: absolute;
      top: 1.25rem;
      right: 1.25rem;
    }

    /* Spinner */
    .btn-os .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="login-wrapper">

    <!-- ── Left: Branding ── -->
    <div class="login-left">
      <div class="login-left-logo">
        <div class="login-left-logo-icon"><i class="bi bi-briefcase-fill"></i></div>
        TravelAgent<span>OS</span>
      </div>

      <div>
        <h1 class="login-left-headline">
          Gestão completa para sua agência de viagens.
        </h1>
        <p class="login-left-sub">
          Vendas, CRM, financeiro e relatórios em uma plataforma unificada e intuitiva.
        </p>
      </div>

      <div class="login-left-footer">
        <span>Seguro</span>
        <span>Cloud</span>
        <span>Multi-loja</span>
      </div>

      <div class="login-left-pattern"></div>
    </div>

    <!-- ── Right: Form ── -->
    <div class="login-right">

      <button class="os-icon-btn login-theme-toggle" id="theme-toggle" title="Alternar tema">
        <i class="bi bi-moon" id="theme-icon"></i>
      </button>

      <div class="login-form-box">

        <!-- Mobile brand -->
        <div class="login-mobile-brand">
          <div class="login-mobile-brand-icon"><i class="bi bi-briefcase-fill"></i></div>
          <div class="login-mobile-brand-text">TravelAgent<span>OS</span></div>
        </div>

        <h2 class="login-welcome">Bem-vindo de volta</h2>
        <p class="login-welcome-sub">Entre com suas credenciais para continuar.</p>

        <!-- Error -->
        <div class="login-error" id="login-error">
          <i class="bi bi-exclamation-circle"></i>
          <span id="login-error-msg">E-mail ou senha incorretos.</span>
        </div>

        <!-- Form -->
        <form id="login-form" novalidate>

          <div class="mb-3">
            <label class="login-label" for="email">E-mail</label>
            <input type="email" id="email" name="email" class="input-os" placeholder="seu@agencia.com" autocomplete="email" autofocus>
          </div>

          <div class="mb-3">
            <div class="d-flex justify-content-between align-items-center mb-1">
              <label class="login-label mb-0" for="password">Senha</label>
              <button type="button" class="login-forgot">Esqueceu?</button>
            </div>
            <input type="password" id="password" name="password" class="input-os" placeholder="Sua senha" autocomplete="current-password">
          </div>

          <button type="submit" class="btn-os btn-full" id="btn-login" style="margin-top:0.5rem">
            <span id="btn-login-text">Entrar</span>
            <span id="btn-login-loading" class="d-none"><span class="spinner"></span></span>
          </button>

        </form>

        <div class="login-divider">ou</div>

        <button class="btn-social" type="button" id="btn-google">
          <img src="https://www.google.com/favicon.ico" alt="">
          Continuar com Google
        </button>

        <div class="login-footer">
          <span><i class="bi bi-shield-check me-1"></i>SSL</span>
          <span><i class="bi bi-cloud-check me-1"></i>v7.0</span>
        </div>

      </div>
    </div>

  </div>

  <div id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/notifications.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    App.initLogin();

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl  = document.getElementById('login-error');
      const errorMsg = document.getElementById('login-error-msg');
      const btnText  = document.getElementById('btn-login-text');
      const btnLoad  = document.getElementById('btn-login-loading');
      const btn      = document.getElementById('btn-login');

      errorEl.classList.remove('show');
      btnText.classList.add('d-none');
      btnLoad.classList.remove('d-none');
      btn.disabled = true;

      const result = await Auth.login(email, password);

      if (result.ok) {
        Notify.success('Bem-vindo, ' + result.user.name + '!');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
      } else {
        errorMsg.textContent = result.error;
        errorEl.classList.add('show');
        btnText.classList.remove('d-none');
        btnLoad.classList.add('d-none');
        btn.disabled = false;
        document.getElementById('email').focus();
      }
    });

    document.getElementById('btn-google').addEventListener('click', function() {
      Notify.info('Login com Google em breve.');
    });
  </script>

</body>
</html>
